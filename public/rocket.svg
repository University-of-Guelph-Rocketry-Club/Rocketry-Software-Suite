<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d18"/>
      <stop offset="100%" style="stop-color:#0d1929"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="url(#bg)"/>
  <!-- Rocket body -->
  <rect x="44" y="30" width="12" height="38" rx="6" fill="#ccddee"/>
  <!-- Nosecone -->
  <polygon points="50,10 44,35 56,35" fill="#ff4444"/>
  <!-- Left fin -->
  <polygon points="44,58 36,72 44,68" fill="#888"/>
  <!-- Right fin -->
  <polygon points="56,58 64,72 56,68" fill="#888"/>
  <!-- Engine glow -->
  <ellipse cx="50" cy="72" rx="5" ry="4" fill="#ff6600" opacity="0.9"/>
  <!-- Accent ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
</svg>
